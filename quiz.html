<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오늘의 식당</title>

</head>
<body>

  <div class="header">
    <h1>🍽️ 오늘의 식당</h1>
    <p>맛있는 한 끼를 즐겨보세요</p>
  </div>

  <!-- 메뉴 카드 목록: flex로 가로 정렬 -->
  <ul class="menu-list">
    <!-- 첫 번째 카드: :first-child 선택자로 주황 테두리 적용됨 -->
    <li class="card">
      <!-- badge: absolute로 카드 오른쪽 위에 고정 -->
      <span class="badge">추천</span>
      <h2>🍜 라멘</h2>
      <p class="price">₩12,000</p>
      <a href="#">주문하기</a>
    </li>
    <li class="card">
      <h2>🍣 초밥</h2>
      <p class="price">₩18,000</p>
      <a href="#">주문하기</a>
    </li>
    <li class="card">
      <h2>🍰 케이크</h2>
      <p class="price">₩8,000</p>
      <a href="#">주문하기</a>
    </li>
  </ul>

  <!-- display: none 으로 현재 숨겨진 공지 영역 -->
  <div class="notice">
    ⚠️ 오늘은 라멘 재료가 소진되었습니다.
  </div>

</body>
</html>
